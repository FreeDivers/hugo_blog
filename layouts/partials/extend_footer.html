<script>
(function() {
    const poems = [
        "蒹葭苍苍，白露为霜。所谓伊人，在水一方。",
        "关关雎鸠，在河之洲。窈窕淑女，君子好逑。",
        "死生契阔，与子成说。执子之手，与子偕老。",
        "愿得一心人，白头不相离。",
        "玲珑骰子安红豆，入骨相思知不知。",
        "两情若是久长时，又岂在朝朝暮暮。",
        "身无彩凤双飞翼，心有灵犀一点通。",
        "曾经沧海难为水，除却巫山不是云。",
        "山有木兮木有枝，心悦君兮君不知。",
        "只愿君心似我心，定不负相思意。",
        "平生不会相思，才会相思，便害相思。"
    ];
    const enNotice = "Notice: Some content on this site has been translated from Chinese with AI assistance.";

    function setRandomPoem() {
        const element = document.querySelector('.home-info .entry-content');
        if (element) {
            const lang = (document.documentElement.lang || "").toLowerCase();
            if (lang.startsWith("en")) {
                element.innerHTML = `<p>${enNotice}</p>`;
                return;
            }
            const randomPoem = poems[Math.floor(Math.random() * poems.length)];
            element.innerHTML = `<p>${randomPoem}</p>`;
        }
    }

    // 页面加载完成后执行
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setRandomPoem);
    } else {
        setRandomPoem();
    }
})();
</script>
